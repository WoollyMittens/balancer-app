<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="initial-scale=1, minimum-scale=1, maximum-scale=1, width=device-width" />
	<title>Energy Balance Prototype</title>

	<link rel="stylesheet" href="./balancer.css" />
	<link rel="stylesheet" href="./balancer-graph.css" />
	<link rel="stylesheet" href="./balancer-log.css" />
	<link rel="stylesheet" href="./balancer-history.css" />
	<link rel="stylesheet" href="./balancer-activities.css" />
	<link rel="stylesheet" href="./balancer-meals.css" />
	<link rel="stylesheet" href="./balancer-settings.css" />
	<link rel="stylesheet" href="./balancer-nav.css" />

	<body>

		<section id="balancer" class="balancer-show-log">

			<figure class="balancer-graph">
				<div class="balancer-graph-scroll"></div>
				<figcaption>
					<span class="balancer-scale-max">8700</span>
					<span class="balancer-scale-min">-8700</span>
					<div class="balancer-scale-activity">
						<b>Activity</b>
						<span class="balancer-activity-sedentary">Sedentary</span>
						<span class="balancer-activity-moderate">Moderate</span>
						<span class="balancer-activity-strenuous">Strenuous</span>
					</div>
					<div class="balancer-projection"></div>
				</figcaption>
			</figure>

			<form class="balancer-log balancer-log-show-history">
				<button class="balancer-log-add-meal">Food</button>
				<button class="balancer-log-add-activity">Sport</button>
				<div class="balancer-log-time">
					<time></time>
					<time></time>
					<label><span>Time </span><input name="time" type="time"/></label>
					<label><span>Date </span><input name="date" type="date"/></label>
				</div>
				<div class="balancer-log-activity">
					<label><input name="activity" type="range" value="1" min="1" max="8"/><span>Sedentary</span><span>Moderate</span><span>Intense</span></label>
				</div>
				<ul class="balancer-log-activities">TODO: add presets for activities</ul>
				<div class="balancer-log-meal">
					<b>10am</b>
					<label><span>Name </span><input name="label" type="text" value="" placeholder="Description"/></label>
					<label><span>Energy </span><input name="value" type="number" value="" placeholder="---"/> kJ</label>
					<p><button>Add</button></p>
				</div>
				<ul class="balancer-log-meals"></ul>
				<div class="balancer-log-history">
					<table></table>
				</div>
			</form>

			<form class="balancer-settings">
				<fieldset>
					<legend>Personal</legend>
					<label><b>Height</b> <input name="height" type="number"/> <i>in centimeters</i></label>
					<label><b>Age</b> <input name="age" type="number"/> <i>in years</i></label>
					<label><b>Weight</b> <input name="weight" type="number"/> <i>in kilos</i></label>
					<label><b>Gender</b> <select name="gender"><option value="0">Female</option><option value="1">Male</option></select></label>
				</fieldset>
				<fieldset>
					<legend>Menu</legend>
					<p>TODO: Meals presets editor</p>
					<p>TODO: Activities presets editor</p>
					<p>TODO: Graph limits editor</p>
					<p>TODO: History controls editor</p>
				</fieldset>
			</form>

			<nav class="balancer-nav">
				<button class="balancer-nav-log">Log</button>
				<button class="balancer-nav-settings">Settings</button>
			</nav>

		</section>

		<script src="./balancer.js"></script>
		<script src="./balancer-graph.js"></script>
		<script src="./balancer-log.js"></script>
		<script src="./balancer-history.js"></script>
		<script src="./balancer-activities.js"></script>
		<script src="./balancer-meals.js"></script>
		<script src="./balancer-settings.js"></script>
		<script src="./balancer-nav.js"></script>
		<script>
			// start a new instance of the class
			var balancer = new Balancer().init({
				root: document.getElementById("balancer"),
				density: 37000, // energy density of body fat (kJ/kg)
				gender: 1, // female or male (index)
				height: 187, // (cm)
				weight: 82, // (kg)
				age: 42, // (years)
				weightloss: 0, // desired weightloss (kg)
				timeline: {}, // collection of activity and diet events
				meals: [{icon: "burger-small", description: "Big Mac", value: 2100}, {icon: "burger-large", description: "Whopper", value: 2800}], // collection of preset diet items
				activities: [{icon: "sitting", description: "Sitting", activity: 1}, {icon: "walking", description: "Walking", activity: 4}, {icon: "running", description: "Running", activity: 8}], // collection of preset exercise items
				minActivity: 1, // minimum metabolic multiplier
				maxActivity: 7, // maximum metabolic multiplier
				scale: 0, // graph scale day/week/month/year
				start: new Date(), // start day
				focus: null, // focussed day
				end: new Date() // end day
			});
		</script>
	</body>

</html>
